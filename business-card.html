<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>כרטיס ביקור – א.א. עבודות קידוחים ופיתוח</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&family=Rubik:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #e8e4df;
    font-family: 'Heebo', sans-serif;
    direction: rtl;
  }

  .card {
    width: 700px;
    height: 400px;
    border-radius: 18px;
    overflow: hidden;
    display: flex;
    position: relative;
    box-shadow: 0 4px 24px rgba(0,0,0,0.12);
  }

  /* ── Right panel: brand with photo ── */
  .brand-panel {
    width: 260px;
    min-width: 260px;
    background: url('images/gallery/bentonite-project-1.webp') center/cover no-repeat;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 28px 24px 24px;
    overflow: hidden;
  }

  .brand-panel::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(170deg, rgba(249,115,22,0.85) 0%, rgba(194,65,12,0.92) 100%);
    pointer-events: none;
  }

  .brand-top { position: relative; z-index: 1; }

  .logo-mark {
    width: 44px;
    height: 44px;
    background: rgba(255,255,255,0.18);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
    border: 1px solid rgba(255,255,255,0.25);
  }

  .logo-mark svg { width: 26px; height: 26px; }

  .brand-name {
    font-size: 22px;
    font-weight: 900;
    color: #fff;
    line-height: 1.3;
    text-shadow: 0 1px 4px rgba(0,0,0,0.15);
  }

  .brand-tagline {
    font-size: 11px;
    font-weight: 500;
    color: rgba(255,255,255,0.8);
    margin-top: 4px;
  }

  .brand-bottom { position: relative; z-index: 1; }

  .license-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.18);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 8px;
    padding: 7px 12px;
    color: #fff;
    font-size: 12px;
    font-weight: 700;
  }

  .license-badge svg { width: 14px; height: 14px; flex-shrink: 0; }

  /* ── Left panel: info with photo bg ── */
  .info-panel {
    flex: 1;
    padding: 28px 30px 24px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    background: url('images/gallery/earthworks-project-1.webp') center/cover no-repeat;
  }

  .info-panel::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.88);
    pointer-events: none;
  }

  .info-top { position: relative; z-index: 1; }

  .owner-name {
    font-size: 30px;
    font-weight: 900;
    color: #1a1a1a;
    line-height: 1.1;
    text-shadow: 0 1px 2px rgba(0,0,0,0.05);
  }

  .owner-role {
    font-size: 14px;
    font-weight: 700;
    color: #F97316;
    margin-top: 2px;
  }

  /* ── Services ── */
  .info-middle {
    position: relative;
    z-index: 1;
  }

  .services-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px 16px;
  }

  .service-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 0;
  }

  .service-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .service-dot.orange { background: #F97316; }
  .service-dot.amber { background: #F59E0B; }
  .service-dot.stone { background: #78716C; }
  .service-dot.warm { background: #DC2626; }

  .service-item span {
    font-size: 13px;
    font-weight: 700;
    color: #292524;
  }

  /* ── Contact - vertical stack ── */
  .info-bottom { position: relative; z-index: 1; }

  .separator {
    width: 100%;
    height: 1px;
    background: linear-gradient(to left, #F97316, #D6D3D1 50%);
    opacity: 0.5;
    margin-bottom: 12px;
  }

  .contact-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px 20px;
  }

  .contact-item {
    display: flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
    color: #44403C;
    transition: color 0.2s;
  }

  .contact-item:hover { color: #F97316; }

  .contact-icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .contact-icon.phone-icon { background: #FFF7ED; border: 1px solid #FDBA74; }
  .contact-icon.wa-icon { background: #F0FDF4; border: 1px solid #86EFAC; }
  .contact-icon.web-icon { background: #F5F5F4; border: 1px solid #D6D3D1; }
  .contact-icon.email-icon { background: #EEF2FF; border: 1px solid #A5B4FC; }

  .contact-icon svg { width: 16px; height: 16px; }

  .contact-value {
    font-size: 13px;
    font-weight: 700;
    color: #1C1917;
    direction: ltr;
    text-align: right;
    font-family: 'Rubik', sans-serif;
  }

  /* ── Mobile ── */
  @media (max-width: 768px) {
    body { padding: 12px; }
    .card { width: 100%; height: auto; flex-direction: column; }
    .brand-panel { width: 100%; min-width: unset; padding: 24px 20px; }
    .brand-name { font-size: 20px; }
    .info-panel { padding: 20px; }
    .owner-name { font-size: 24px; }
    .services-grid { grid-template-columns: 1fr; gap: 4px; }
    .contact-grid { grid-template-columns: 1fr; gap: 6px; }
  }
</style>
</head>
<body>

<div class="card">

  </div>

</div>

</body>
</html>
